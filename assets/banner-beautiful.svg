<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-label="Cow Hut Backend beautiful banner">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="500" fill="url(#bg)"/>
  <circle cx="1300" cy="96" r="120" fill="#22d3ee" opacity="0.12"/>
  <circle cx="1460" cy="360" r="160" fill="#f59e0b" opacity="0.10"/>
  <circle cx="215" cy="390" r="220" fill="#34d399" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="90" y="70" width="700" height="360" rx="32" fill="url(#card)" stroke="#253145"/>
    <rect x="126" y="110" width="255" height="18" rx="9" fill="url(#panel)"/>
    <text x="126" y="190" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">Cow Hut Backend</text>
    <text x="126" y="255" fill="#bfdbfe" font-family="Segoe UI, Arial, sans-serif" font-size="32">Node.js • Express • TypeScript • MongoDB</text>
    <text x="126" y="315" fill="#e5eefb" font-family="Segoe UI, Arial, sans-serif" font-size="26">REST API for buying, selling, and managing cows</text>
    <rect x="126" y="350" width="180" height="8" rx="4" fill="url(#panel)"/>
    <rect x="326" y="350" width="120" height="8" rx="4" fill="#334155"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="110" width="610" height="280" rx="34" fill="#0b1220" stroke="#243244"/>
    <rect x="905" y="150" width="120" height="120" rx="28" fill="#fbbf24" opacity="0.12"/>
    <path d="M960 198 C 995 152, 1048 154, 1080 198 C 1060 225, 1030 243, 990 245 C 955 244, 927 226, 960 198 Z" fill="#fbbf24" opacity="0.95"/>
    <path d="M1038 176 C 1085 140, 1140 152, 1170 201 C 1139 220, 1094 230, 1048 226 C 1011 224, 1005 194, 1038 176 Z" fill="#22c55e" opacity="0.95"/>
    <path d="M1118 170 C 1158 145, 1210 165, 1238 208 C 1196 227, 1147 235, 1108 225 C 1086 220, 1094 185, 1118 170 Z" fill="#f472b6" opacity="0.92"/>
    <text x="905" y="325" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Scalable • Secure • Production Ready</text>
    <text x="905" y="372" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="22">Built for modern backend workflows</text>
  </g>
</svg>